<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>防小人護盾</title>

<link rel="manifest" href="manifest.webmanifest" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:    '#0a0a0a',
          panel:  '#141414',
          edge:   '#1f1f1f',
          calm:   '#3b82f6',
          shield: '#22d3ee',
          warn:   '#f59e0b',
        },
        fontFamily: {
          sans: ['"Noto Sans TC"', 'system-ui', 'sans-serif'],
        },
      },
    },
  };
</script>
<style>
  html, body { height: 100%; overscroll-behavior: none; }
  body { background: #0a0a0a; color: #f5f5f5; -webkit-tap-highlight-color: transparent; }
  .screen { display: none; }
  .screen.active { display: flex; }
  .btn-press:active { transform: scale(0.97); }
  /* 呼吸圈動畫：吸 4 秒、停 7 秒、吐 8 秒 */
  @keyframes breathe {
    0%   { transform: scale(0.6); }
    21%  { transform: scale(1.0); }   /* 吸氣 4s */
    58%  { transform: scale(1.0); }   /* 屏息 7s */
    100% { transform: scale(0.6); }   /* 吐氣 8s */
  }
  .breathe-orb { animation: breathe 19s ease-in-out infinite; }

  /* 降溫模塊：計時器圓弧 */
  .timer-ring { transition: stroke-dashoffset 1s linear; }

  /* 情緒溫度計按鈕：選中時亮起 */
  .score-btn { transition: background 0.15s, transform 0.1s; }
  .score-btn.selected { transform: scale(1.15); }

  /* 技巧卡展開動畫 */
  .technique-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .technique-card.open .technique-body { max-height: 200px; }
</style>
</head>
<body class="font-sans select-none">

<!-- 容器 -->
<main id="app" class="min-h-screen flex flex-col">

  <!-- 頂部列：極簡，只有 logo 與設定 -->
  <header class="flex items-center justify-between px-5 pt-5 pb-3">
    <div class="text-xs tracking-[0.3em] text-neutral-500">SHIELD · 護盾</div>
    <button data-go="settings" class="text-neutral-500 text-xl btn-press">⚙</button>
  </header>

  <!-- ===== 畫面 1：主盾牌頁 ===== -->
  <section id="screen-shield" class="screen active flex-1 flex-col items-center justify-center px-6">
    <p class="text-neutral-400 text-sm mb-8">深呼吸。錢是你的，情緒也是你的。</p>
    <button id="btn-shield"
      class="btn-press w-64 h-64 rounded-full bg-gradient-to-br from-shield/30 to-calm/20
             border border-shield/40 shadow-[0_0_60px_-10px_rgba(34,211,238,0.5)]
             text-shield text-2xl tracking-widest font-light">
      我現在很躁
    </button>
    <button data-go="translator"
      class="mt-10 text-neutral-300 text-base underline underline-offset-4 decoration-neutral-700 btn-press">
      直接翻譯氣話 →
    </button>
  </section>

  <!-- ===== 畫面 2：降溫模塊 ===== -->
  <section id="screen-cool" class="screen flex-1 flex-col px-6 pb-8 overflow-y-auto">

    <!-- Step A：情緒溫度計 -->
    <div id="cool-step-score">
      <h2 class="text-xl mt-2 mb-1">現在幾分燙？</h2>
      <p class="text-neutral-500 text-sm mb-5">1 = 有點煩　10 = 快爆炸</p>
      <div class="grid grid-cols-5 gap-2 mb-3">
        <!-- JS 動態生成 -->
      </div>
      <div id="cool-score-hint" class="text-neutral-600 text-sm text-center mt-2">點一個數字</div>
    </div>

    <!-- Step B：技巧 + 計時器（選完分數才顯示） -->
    <div id="cool-step-action" class="hidden mt-6">

      <div id="cool-heat-label" class="text-sm text-neutral-400 mb-4"></div>

      <!-- 技巧卡列表（JS 動態注入） -->
      <div id="cool-techniques-list" class="space-y-3 mb-6"></div>

      <!-- 暫停計時器 -->
      <div class="rounded-2xl bg-panel border border-edge p-5">
        <p class="text-neutral-400 text-sm mb-3">先暫停，給自己幾秒不回應</p>

        <!-- 秒數選擇 -->
        <div class="flex gap-2 mb-5">
          <button class="timer-dur-btn flex-1 py-2 rounded-xl bg-edge text-neutral-300 text-sm btn-press" data-sec="60">60秒</button>
          <button class="timer-dur-btn flex-1 py-2 rounded-xl bg-edge text-neutral-300 text-sm btn-press" data-sec="90">90秒</button>
          <button class="timer-dur-btn flex-1 py-2 rounded-xl bg-edge text-neutral-300 text-sm btn-press" data-sec="120">2分鐘</button>
          <button class="timer-dur-btn flex-1 py-2 rounded-xl bg-edge text-neutral-300 text-sm btn-press" data-sec="180">3分鐘</button>
        </div>

        <!-- 圓弧計時器 -->
        <div class="flex flex-col items-center">
          <div class="relative w-36 h-36">
            <svg class="w-full h-full -rotate-90" viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="52" fill="none" stroke="#1f1f1f" stroke-width="8"/>
              <circle id="timer-arc" cx="60" cy="60" r="52" fill="none"
                stroke="#22d3ee" stroke-width="8" stroke-linecap="round"
                stroke-dasharray="326.7" stroke-dashoffset="0"
                class="timer-ring"/>
            </svg>
            <div id="timer-display" class="absolute inset-0 flex flex-col items-center justify-center">
              <span id="timer-number" class="text-3xl text-shield font-light">60</span>
              <span class="text-neutral-600 text-xs">秒</span>
            </div>
          </div>

          <button id="btn-timer-start"
            class="mt-5 px-10 py-3 rounded-full bg-shield/20 border border-shield/40 text-shield btn-press">
            開始
          </button>
          <div id="timer-done-msg" class="hidden mt-4 text-neutral-300 text-sm text-center">
            好了。深一口氣，你可以繼續了。
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- ===== 畫面 3：呼吸頁 ===== -->
  <section id="screen-breathe" class="screen flex-1 flex-col items-center justify-center px-6">
    <div class="relative w-72 h-72 flex items-center justify-center">
      <div class="absolute w-full h-full rounded-full bg-calm/10"></div>
      <div class="breathe-orb w-full h-full rounded-full bg-gradient-to-br from-calm/40 to-shield/30 border border-shield/30"></div>
      <div id="breathe-label" class="absolute text-shield text-xl tracking-widest">準備</div>
    </div>
    <p class="mt-10 text-neutral-400 text-sm">跟著圈圈：吸 4 · 停 7 · 吐 8</p>
    <button data-go="translator"
      class="mt-8 px-8 py-3 rounded-full bg-edge text-neutral-200 btn-press">我冷靜了，下一步</button>
  </section>

  <!-- ===== 畫面 3：禮貌化回應生成器 ===== -->
  <section id="screen-translator" class="screen flex-1 flex-col px-6 pb-8 overflow-y-auto">
    <h2 class="text-xl mt-2 mb-1">禮貌化回應生成器</h2>
    <p class="text-neutral-500 text-sm mb-4">說說發生什麼事，我幫你把想說的話包得有界線。</p>

    <!-- 快速情境 chip -->
    <div class="flex gap-2 overflow-x-auto pb-2 mb-4" style="-webkit-overflow-scrolling:touch">
      <button class="scenario-chip shrink-0 px-4 py-2 rounded-full bg-edge border border-neutral-700 text-neutral-300 text-sm btn-press whitespace-nowrap" data-scenario="blame_shift">鍋甩給我</button>
      <button class="scenario-chip shrink-0 px-4 py-2 rounded-full bg-edge border border-neutral-700 text-neutral-300 text-sm btn-press whitespace-nowrap" data-scenario="attitude">態度差/酸</button>
      <button class="scenario-chip shrink-0 px-4 py-2 rounded-full bg-edge border border-neutral-700 text-neutral-300 text-sm btn-press whitespace-nowrap" data-scenario="unfair_load">工作分配不公</button>
      <button class="scenario-chip shrink-0 px-4 py-2 rounded-full bg-edge border border-neutral-700 text-neutral-300 text-sm btn-press whitespace-nowrap" data-scenario="supervisor_pressure">主管施壓</button>
      <button class="scenario-chip shrink-0 px-4 py-2 rounded-full bg-edge border border-neutral-700 text-neutral-300 text-sm btn-press whitespace-nowrap" data-scenario="passive_aggressive">冷嘲熱諷</button>
      <button class="scenario-chip shrink-0 px-4 py-2 rounded-full bg-edge border border-neutral-700 text-neutral-300 text-sm btn-press whitespace-nowrap" data-scenario="repeat_nag">同件事一直盧</button>
    </div>

    <!-- 輸入區 -->
    <textarea id="rant-input" rows="4"
      placeholder="例：組員把自己沒做的部分全推給我，還說是我沒溝通清楚..."
      class="w-full bg-panel border border-edge rounded-2xl p-4 text-neutral-100 placeholder:text-neutral-600 focus:outline-none focus:border-shield/50 text-sm"></textarea>

    <div class="flex gap-3 mt-3">
      <button id="btn-voice" class="flex-none px-5 py-3 rounded-xl bg-edge text-neutral-200 btn-press">🎙</button>
      <button id="btn-generate" class="flex-1 py-3 rounded-xl bg-shield/20 border border-shield/40 text-shield btn-press font-medium">生成 3 種回應</button>
      <button data-go="scripts" class="flex-none px-4 py-3 rounded-xl bg-edge text-neutral-400 btn-press text-sm">話術庫</button>
    </div>

    <!-- 三種回應卡 -->
    <div id="response-cards" class="mt-5 space-y-3 hidden">

      <div class="response-card rounded-2xl bg-panel border border-emerald-900/60 overflow-hidden">
        <div class="flex items-center gap-2 px-4 pt-4 pb-2">
          <span class="text-xs px-2 py-0.5 rounded-full bg-emerald-900/60 text-emerald-400 border border-emerald-700/50">安全中性</span>
          <span class="text-neutral-600 text-xs">灰岩法・最短最無聊</span>
        </div>
        <p id="resp-gray" class="px-4 pb-3 text-neutral-100 text-base leading-relaxed"></p>
        <button class="copy-resp w-full py-2 text-neutral-500 text-xs border-t border-emerald-900/40 btn-press active:bg-emerald-900/20">複製</button>
      </div>

      <div class="response-card rounded-2xl bg-panel border border-calm/30 overflow-hidden">
        <div class="flex items-center gap-2 px-4 pt-4 pb-2">
          <span class="text-xs px-2 py-0.5 rounded-full bg-calm/20 text-calm border border-calm/30">禮貌堅定</span>
          <span class="text-neutral-600 text-xs">I statement・有禮有節</span>
        </div>
        <p id="resp-firm" class="px-4 pb-3 text-neutral-100 text-base leading-relaxed"></p>
        <button class="copy-resp w-full py-2 text-neutral-500 text-xs border-t border-calm/20 btn-press active:bg-calm/10">複製</button>
      </div>

      <div class="response-card rounded-2xl bg-panel border border-warn/30 overflow-hidden">
        <div class="flex items-center gap-2 px-4 pt-4 pb-2">
          <span class="text-xs px-2 py-0.5 rounded-full bg-warn/20 text-warn border border-warn/30">設定界線</span>
          <span class="text-neutral-600 text-xs">適合重複發生時</span>
        </div>
        <p id="resp-boundary" class="px-4 pb-3 text-neutral-100 text-base leading-relaxed"></p>
        <button class="copy-resp w-full py-2 text-neutral-500 text-xs border-t border-warn/20 btn-press active:bg-warn/10">複製</button>
      </div>

    </div>

    <!-- LLM 接口預留 -->
    <div class="mt-4 flex items-center gap-2">
      <div class="flex-1 h-px bg-edge"></div>
      <span class="text-neutral-700 text-xs">或</span>
      <div class="flex-1 h-px bg-edge"></div>
    </div>
    <button id="btn-llm" disabled
      class="mt-3 w-full py-3 rounded-xl bg-edge/50 border border-neutral-800 text-neutral-700 text-sm">
      ✦ AI 真實生成（設定 > 填入 API Key 後啟用）
    </button>
  </section>

  <!-- ===== 畫面 4：話術庫 ===== -->
  <section id="screen-scripts" class="screen flex-1 flex-col px-6 pb-8">
    <h2 class="text-xl mt-2 mb-4">萬用話術</h2>
    <ul id="scripts-list" class="space-y-3"></ul>
  </section>

  <!-- ===== 畫面 5：設定 ===== -->
  <section id="screen-settings" class="screen flex-1 flex-col px-6 pb-8">
    <h2 class="text-xl mt-2 mb-4">設定</h2>
    <p class="text-neutral-500 text-sm">P1 階段加：震動、語音、字級、自訂話術。</p>
  </section>

  <!-- 底部回主頁 -->
  <nav class="px-6 py-4 flex justify-center">
    <button data-go="shield" class="text-neutral-500 text-sm tracking-widest btn-press">⌂ 回護盾</button>
  </nav>
</main>

<script>
/* ---------- 路由 ---------- */
const screens = ['shield', 'cool', 'breathe', 'translator', 'scripts', 'settings'];
function go(name) {
  screens.forEach(s => {
    const el = document.getElementById('screen-' + s);
    if (el) el.classList.toggle('active', s === name);
  });
  if (navigator.vibrate) navigator.vibrate(8);
  window.scrollTo(0, 0);
}
document.querySelectorAll('[data-go]').forEach(b =>
  b.addEventListener('click', () => go(b.dataset.go))
);

/* ---------- 主盾牌：啟動 → 降溫模塊 ---------- */
document.getElementById('btn-shield').addEventListener('click', () => {
  if (navigator.vibrate) navigator.vibrate([30, 40, 30]);
  resetCool();
  go('cool');
});

/* ============================================================
   降溫模塊
   ============================================================ */

/* 技巧資料庫 */
const TECHNIQUES = {
  breathe: {
    icon: '🌬️', title: '4-7-8 呼吸',
    body: '吸 4 秒 → 屏息 7 秒 → 吐氣 8 秒。做兩輪，副交感神經強制介入，心跳會降下來。',
    action: { label: '進入呼吸引導', cb: () => { go('breathe'); startBreatheLabel(); } },
  },
  fist: {
    icon: '✊', title: '握拳釋放',
    body: '雙手用力握緊拳頭，數 5 秒，然後瞬間完全放開。重複 3 次。把累積的火氣從手指排出去。',
  },
  grayrock: {
    icon: '🪨', title: '灰岩法',
    body: '你現在是一塊無聊的石頭。只給最短回應：「喔」「好」「沒辦法」。不解釋、不爭辯、不給能量。對方想引爆你，你就讓他撞牆。',
  },
  reframe_high: {
    icon: '💡', title: '認知重構',
    body: '她的爛心情不是你造成的，也不是你能修的。你的工作是賣東西，不是處理別人的情緒問題。',
  },
  reframe_mid: {
    icon: '💰', title: '認知重構',
    body: '這 2 分鐘的火，不值得賠上今晚的收入和明天的心情。錢比較重要，氣等一下再生。',
  },
  reframe_low: {
    icon: '🧠', title: '認知重構',
    body: '擺攤是來賺錢的，不是來贏辯論的。這個人離開之後你不會再見到他，不需要讓他佔據你的腦子。',
  },
  ground: {
    icon: '👁️', title: '感官接地',
    body: '環顧四周，說出你看到的 3 樣東西。把注意力從那個人身上拉回現實環境。',
  },
};

/* 依燙度決定顯示哪些技巧 */
function getTechniquesForScore(score) {
  if (score >= 8) return ['breathe', 'fist', 'grayrock', 'reframe_high', 'ground'];
  if (score >= 5) return ['fist', 'grayrock', 'reframe_mid', 'breathe'];
  return ['reframe_low', 'grayrock', 'reframe_mid'];
}

/* 燙度對應文字 */
function heatLabel(score) {
  if (score >= 8) return `燙度 ${score}/10　—　先讓身體冷靜，再想後續`;
  if (score >= 5) return `燙度 ${score}/10　—　有點熱，用技巧把火壓下去`;
  return `燙度 ${score}/10　—　你還撐得住，把姿態保住`;
}

/* 燙度按鈕顏色 */
function scoreColor(n) {
  if (n <= 3) return { bg: 'bg-emerald-900/60', border: 'border-emerald-500/60', text: 'text-emerald-300', sel: 'bg-emerald-600' };
  if (n <= 6) return { bg: 'bg-amber-900/60',   border: 'border-amber-500/60',   text: 'text-amber-300',   sel: 'bg-amber-500'  };
  return             { bg: 'bg-red-900/60',      border: 'border-red-500/60',     text: 'text-red-300',     sel: 'bg-red-600'    };
}

/* 建立分數按鈕 */
(function buildScoreButtons() {
  const grid = document.querySelector('#cool-step-score .grid');
  for (let n = 1; n <= 10; n++) {
    const c = scoreColor(n);
    const btn = document.createElement('button');
    btn.className = `score-btn py-4 rounded-2xl ${c.bg} border ${c.border} ${c.text} text-xl font-light btn-press`;
    btn.textContent = n;
    btn.dataset.score = n;
    btn.addEventListener('click', () => onScoreSelected(n));
    grid.appendChild(btn);
  }
})();

function onScoreSelected(score) {
  /* 按鈕視覺 */
  document.querySelectorAll('.score-btn').forEach(b => {
    const n = +b.dataset.score;
    const c = scoreColor(n);
    b.classList.remove('selected', 'bg-emerald-600', 'bg-amber-500', 'bg-red-600');
    b.className = `score-btn py-4 rounded-2xl ${c.bg} border ${c.border} ${c.text} text-xl font-light btn-press`;
    if (n === score) {
      b.classList.add('selected', scoreColor(n).sel.split(' ')[0]);
    }
  });
  document.getElementById('cool-score-hint').textContent = `${score} 分`;

  /* 顯示技巧區 */
  document.getElementById('cool-heat-label').textContent = heatLabel(score);
  buildTechniqueCards(getTechniquesForScore(score));
  document.getElementById('cool-step-action').classList.remove('hidden');

  if (navigator.vibrate) navigator.vibrate(12);
  setTimeout(() => document.getElementById('cool-step-action').scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
}

/* 建立技巧卡 */
function buildTechniqueCards(keys) {
  const list = document.getElementById('cool-techniques-list');
  list.innerHTML = '';
  keys.forEach((key, i) => {
    const t = TECHNIQUES[key];
    if (!t) return;
    const card = document.createElement('div');
    card.className = 'technique-card rounded-2xl bg-panel border border-edge overflow-hidden';
    card.innerHTML = `
      <button class="technique-toggle w-full flex items-center gap-3 px-4 py-4 btn-press text-left">
        <span class="text-2xl">${t.icon}</span>
        <span class="flex-1 text-neutral-100">${t.title}</span>
        <span class="technique-arrow text-neutral-600 text-sm transition-transform">▼</span>
      </button>
      <div class="technique-body px-4 pb-0">
        <p class="text-neutral-400 text-sm leading-relaxed pb-4">${t.body}</p>
        ${t.action ? `<button class="technique-action mb-4 px-5 py-2 rounded-full bg-shield/20 border border-shield/40 text-shield text-sm btn-press">${t.action.label}</button>` : ''}
      </div>`;

    /* 預設第一張展開 */
    if (i === 0) {
      card.classList.add('open');
      card.querySelector('.technique-arrow').style.transform = 'rotate(180deg)';
    }

    card.querySelector('.technique-toggle').addEventListener('click', () => {
      const isOpen = card.classList.toggle('open');
      card.querySelector('.technique-arrow').style.transform = isOpen ? 'rotate(180deg)' : '';
    });

    if (t.action) {
      card.querySelector('.technique-action').addEventListener('click', t.action.cb);
    }

    list.appendChild(card);
  });
}

/* ---- 計時器 ---- */
let timerTotal = 60, timerLeft = 60, timerInterval = null, timerRunning = false;
const CIRCUMFERENCE = 2 * Math.PI * 52; // 326.7

function setTimerDuration(sec) {
  clearTimerInterval();
  timerTotal = timerLeft = sec;
  timerRunning = false;
  updateTimerDisplay();
  document.getElementById('timer-done-msg').classList.add('hidden');
  document.getElementById('btn-timer-start').textContent = '開始';
  document.querySelectorAll('.timer-dur-btn').forEach(b => {
    b.classList.toggle('!border-shield/60', +b.dataset.sec === sec);
    b.classList.toggle('text-shield', +b.dataset.sec === sec);
  });
}

function updateTimerDisplay() {
  document.getElementById('timer-number').textContent = timerLeft;
  const offset = CIRCUMFERENCE * (1 - timerLeft / timerTotal);
  document.getElementById('timer-arc').style.strokeDashoffset = offset;
}

function clearTimerInterval() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

document.querySelectorAll('.timer-dur-btn').forEach(b =>
  b.addEventListener('click', () => setTimerDuration(+b.dataset.sec))
);

document.getElementById('btn-timer-start').addEventListener('click', () => {
  if (timerRunning) {
    clearTimerInterval();
    timerRunning = false;
    document.getElementById('btn-timer-start').textContent = '繼續';
  } else {
    if (timerLeft <= 0) setTimerDuration(timerTotal);
    timerRunning = true;
    document.getElementById('btn-timer-start').textContent = '暫停';
    timerInterval = setInterval(() => {
      timerLeft--;
      updateTimerDisplay();
      if (timerLeft <= 0) {
        clearTimerInterval();
        timerRunning = false;
        document.getElementById('btn-timer-start').textContent = '重來';
        document.getElementById('timer-done-msg').classList.remove('hidden');
        if (navigator.vibrate) navigator.vibrate([100, 80, 100, 80, 200]);
      }
    }, 1000);
  }
});

/* 重置降溫模塊狀態（每次進入時呼叫） */
function resetCool() {
  document.querySelectorAll('.score-btn').forEach(b => {
    const n = +b.dataset.score;
    const c = scoreColor(n);
    b.className = `score-btn py-4 rounded-2xl ${c.bg} border ${c.border} ${c.text} text-xl font-light btn-press`;
    b.classList.remove('selected');
  });
  document.getElementById('cool-score-hint').textContent = '點一個數字';
  document.getElementById('cool-step-action').classList.add('hidden');
  setTimerDuration(60);
}

/* ---------- 呼吸文字輪播（與 CSS 動畫對齊：4 / 7 / 8 秒） ---------- */
let breatheTimer = null;
function startBreatheLabel() {
  const label = document.getElementById('breathe-label');
  const cycle = [['吸', 4000], ['停', 7000], ['吐', 8000]];
  let i = 0;
  clearInterval(breatheTimer);
  const tick = () => {
    label.textContent = cycle[i][0];
    breatheTimer = setTimeout(() => { i = (i + 1) % 3; tick(); }, cycle[i][1]);
  };
  tick();
}

/* ============================================================
   禮貌化回應生成器
   每個情境有 3 種回應：gray（安全中性）/ firm（禮貌堅定）/ boundary（設定界線）
   keywords 用來偵測自由輸入文字；chip data-scenario 直接對應 id
   ============================================================ */

const SITUATION_DB = {
  blame_shift: {
    keywords: /推給我|怪我|我的問題|我的責任|害我|都是我|我錯了|沒溝通|沒做好|甩鍋|推卸/,
    gray:     '我知道了。',
    firm:     '我理解你有這樣的感受，但就我所知道的情況，這件事的來龍去脈是這樣的：[說明事實]。我想我們對這件事的理解不太一樣。',
    boundary: '這件事我的部分我已經做了，責任的歸屬我有自己的判斷。如果你有不同看法，我們可以各自說清楚，但我不會接受這樣的定論。',
  },
  attitude: {
    keywords: /態度|語氣|口氣|公主|兇|嗆|怎麼跟我說話|好像欠她|看不起|瞧不起|高人一等|不尊重/,
    gray:     '嗯。',
    firm:     '我覺得我們溝通的方式可以更順暢一點。我想好好把事情講清楚，但需要在比較平等的狀態下談。',
    boundary: '我願意繼續討論這件事，但前提是互相尊重。這樣的說話方式讓我很難繼續溝通，希望你能理解。',
  },
  unfair_load: {
    keywords: /我做比較多|分配不公|都是我在|他沒做|她沒貢獻|份量不均|憑什麼我|白做|出工|不公平/,
    gray:     '我記住了。',
    firm:     '我想提一下工作分配的問題。我目前負責的部分比當初討論的多，我希望我們可以重新確認一下每個人的範圍。',
    boundary: '我做這個沒問題，但我需要這件事被看見。如果分工一直是這樣的狀態，我之後會需要調整我能承擔的範圍。',
  },
  supervisor_pressure: {
    keywords: /主管|老闆|上司|長官|叫我|要我|命令|交代|不合理|壓力|Deadline|截止|為什麼是我|加班/,
    gray:     '好，我知道了。',
    firm:     '我會盡力配合，但我想先確認一下這個需求的優先順序，因為目前手上還有其他事情在跑，想確保都能做好。',
    boundary: '這個我可以做，但我需要說明一下目前的狀況：[說明現況]。如果這是最優先的，我會需要調整其他事項的時程，可以再確認嗎？',
  },
  passive_aggressive: {
    keywords: /酸|諷刺|話中有話|陰陽怪氣|不是針對你|只是說說|沒什麼意思|大家都知道|聽說|暗示/,
    gray:     '嗯，謝謝你告訴我。',
    firm:     '我聽到你說的，但我不太確定你的意思是什麼。如果你有什麼想直接說的，我很樂意聽。',
    boundary: '我不太習慣這種方式溝通。如果你對我有什麼意見或不滿，我希望你可以直接說，這樣對大家都比較好。',
  },
  repeat_nag: {
    keywords: /又來|一直|還是|繞回來|說了幾次|講幾遍|重複|一樣的話|又提|沒完|還在|怎麼還/,
    gray:     '就這樣。',
    firm:     '這件事我們已經討論過了，我的想法跟上次一樣。如果有新的資訊或角度，我很願意再聊，但目前的立場不會變。',
    boundary: '這件事我的答案不會變了。我理解你還有想法，但反覆討論同一件事對我們都是消耗，我想把這個話題到這裡結束。',
  },
};

const FALLBACK = {
  gray:     '我知道了。',
  firm:     '我理解你的想法。這件事我有自己的判斷，我們對這個問題可能有不同的看法。',
  boundary: '我的立場已經很清楚了。如果你有新的想法我很願意聽，但這件事我的回答不會改變。',
};

function detectSituation(text) {
  for (const [id, sit] of Object.entries(SITUATION_DB)) {
    if (sit.keywords.test(text)) return sit;
  }
  return null;
}

function renderResponses(sit) {
  const s = sit || FALLBACK;
  document.getElementById('resp-gray').textContent     = s.gray;
  document.getElementById('resp-firm').textContent     = s.firm;
  document.getElementById('resp-boundary').textContent = s.boundary;
  const cards = document.getElementById('response-cards');
  cards.classList.remove('hidden');
  setTimeout(() => cards.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
}

/* 快速情境 chip */
document.querySelectorAll('.scenario-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.scenario-chip').forEach(c =>
      c.classList.remove('!border-shield/60', 'text-shield'));
    chip.classList.add('!border-shield/60', 'text-shield');
    if (navigator.vibrate) navigator.vibrate(8);
    renderResponses(SITUATION_DB[chip.dataset.scenario]);
  });
});

/* 自由輸入 → 生成 */
document.getElementById('btn-generate').addEventListener('click', () => {
  const text = document.getElementById('rant-input').value.trim();
  if (!text) { renderResponses(null); return; }
  const sit = detectSituation(text);
  renderResponses(sit);
});

/* 每張卡的複製按鈕 */
document.querySelectorAll('.copy-resp').forEach((btn, i) => {
  btn.addEventListener('click', async () => {
    const ids = ['resp-gray', 'resp-firm', 'resp-boundary'];
    const txt = document.getElementById(ids[i]).textContent;
    try { await navigator.clipboard.writeText(txt); } catch (e) {}
    btn.textContent = '✓ 已複製';
    setTimeout(() => { btn.textContent = '複製'; }, 1200);
    if (navigator.vibrate) navigator.vibrate(15);
  });
});

/* 語音輸入 */
document.getElementById('btn-voice').addEventListener('click', () => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('這台手機暫不支援語音，先用打字。'); return; }
  const r = new SR(); r.lang = 'zh-TW'; r.start();
  r.onresult = e => {
    document.getElementById('rant-input').value = e.results[0][0].transcript;
  };
});

const SCRIPTS = [
  '不好意思，這個價錢已經是底價了，沒辦法再低喔。',
  '老闆說今天就這個價，您要不要再考慮一下？',
  '抱歉，這部分我們沒辦法配合，謝謝您。',
  '不好意思，後面還有客人，麻煩您決定一下。',
  '這個品質就是這個價格，您可以再比較看看。',
  '不好意思，做生意要互相，這樣我會虧本。',
  '謝謝您今天過來，祝您順心。',
  '我們不接受這樣的講話方式，請您離開，謝謝。',
];
const list = document.getElementById('scripts-list');
SCRIPTS.forEach(s => {
  const li = document.createElement('li');
  li.className = 'p-4 rounded-2xl bg-panel border border-edge text-neutral-200 btn-press active:bg-edge';
  li.textContent = s;
  li.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(s); } catch (e) {}
    li.classList.add('!border-shield/60');
    setTimeout(() => li.classList.remove('!border-shield/60'), 600);
    if (navigator.vibrate) navigator.vibrate(15);
  });
  list.appendChild(li);
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
