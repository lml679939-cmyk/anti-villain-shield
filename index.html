<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>防小人護盾</title>

<link rel="manifest" href="manifest.webmanifest" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:    '#0a0a0a',
          panel:  '#141414',
          edge:   '#1f1f1f',
          calm:   '#3b82f6',
          shield: '#22d3ee',
          warn:   '#f59e0b',
          rage:   '#ef4444',
          fire:   '#f97316',
        },
        fontFamily: {
          sans: ['"Noto Sans TC"', 'system-ui', 'sans-serif'],
        },
      },
    },
  };
</script>
<style>
  html, body { height: 100%; overscroll-behavior: none; }
  body { background: #0a0a0a; color: #f5f5f5; -webkit-tap-highlight-color: transparent; }
  .screen { display: none; }
  .screen.active { display: flex; }
  .btn-press:active { transform: scale(0.96); }

  /* ── 「我現在很躁」pulse 動畫 ── */
  @keyframes pulse-rage {
    0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.6), 0 0 40px -8px rgba(249,115,22,0.4); }
    60%  { box-shadow: 0 0 0 18px rgba(239,68,68,0), 0 0 60px -8px rgba(249,115,22,0.2); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0), 0 0 40px -8px rgba(249,115,22,0.4); }
  }
  .rage-pulse { animation: pulse-rage 2.2s ease-in-out infinite; }

  /* ── 呼吸圈 CSS transition 由 JS 驅動 ── */
  #breathe-orb {
    transform: scale(0.45);
    transition: transform 4s ease-in-out;
    will-change: transform;
  }

  /* ── 溫度計 segment ── */
  .thermo-seg {
    transition: transform 0.12s, opacity 0.12s;
    cursor: pointer;
  }
  .thermo-seg:active { transform: scaleY(0.92); }
  .thermo-seg.active-seg {
    transform: scaleY(1.25) !important;
    outline: 2px solid rgba(255,255,255,0.9);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ── 圓形計時器 ── */
  #timer-ring {
    transition: stroke-dashoffset 1s linear;
    stroke-linecap: round;
  }

  /* ── 舊的呼吸動畫（護盾按鈕流程保留） ── */
  @keyframes breathe-old {
    0%   { transform: scale(0.6); }
    21%  { transform: scale(1.0); }
    58%  { transform: scale(1.0); }
    100% { transform: scale(0.6); }
  }
  .breathe-orb-old { animation: breathe-old 19s ease-in-out infinite; }

  /* ── 完成閃爍 ── */
  @keyframes done-flash {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
  .done-flash { animation: done-flash 0.6s ease-in-out 3; }
</style>
</head>
<body class="font-sans select-none">

<main id="app" class="min-h-screen flex flex-col">

  <!-- 頂部列 -->
  <header class="flex items-center justify-between px-5 pt-5 pb-3 flex-shrink-0">
    <div class="text-xs tracking-[0.3em] text-neutral-500">SHIELD · 護盾</div>
    <button data-go="settings" class="text-neutral-500 text-xl btn-press">⚙</button>
  </header>

  <!-- ════════════════════════════════════════
       畫面 1：主盾牌頁
  ════════════════════════════════════════ -->
  <section id="screen-shield" class="screen active flex-1 flex-col items-center justify-between px-6 pb-8">

    <!-- 上半：護盾按鈕 -->
    <div class="flex-1 flex flex-col items-center justify-center">
      <p class="text-neutral-400 text-sm mb-8">深呼吸。你有界線，你撐得住。</p>
      <button id="btn-shield"
        class="btn-press w-56 h-56 rounded-full bg-gradient-to-br from-shield/30 to-calm/20
               border border-shield/40 shadow-[0_0_60px_-10px_rgba(34,211,238,0.5)]
               text-shield text-2xl tracking-widest font-light">
        啟動護盾
      </button>
      <button data-go="translator"
        class="mt-8 text-neutral-400 text-sm underline underline-offset-4 decoration-neutral-700 btn-press">
        直接生成回應 →
      </button>
    </div>

    <!-- 下半：緊急大按鈕 -->
    <div class="w-full">
      <p class="text-center text-neutral-600 text-xs mb-3 tracking-widest">— 情緒緊急出口 —</p>
      <button id="btn-rage"
        class="rage-pulse btn-press w-full py-6 rounded-2xl
               bg-gradient-to-r from-red-600 via-orange-500 to-red-500
               text-white text-2xl font-bold tracking-widest
               border border-red-400/30">
        我現在很躁
      </button>
    </div>
  </section>

  <!-- ════════════════════════════════════════
       畫面 2：情緒溫度計
  ════════════════════════════════════════ -->
  <section id="screen-rage" class="screen flex-1 flex-col px-6 pb-8">

    <div class="mt-4 mb-6">
      <h2 class="text-2xl font-bold text-white">現在幾分躁？</h2>
      <p class="text-neutral-500 text-sm mt-1">按下你的感受，1 最輕、10 最爆</p>
    </div>

    <!-- 溫度計主體 -->
    <div class="relative">
      <!-- 分數大顯示 -->
      <div id="rage-score-display" class="text-center mb-6">
        <span id="rage-score-num" class="text-8xl font-black text-neutral-700">?</span>
        <span id="rage-score-label" class="block text-neutral-600 text-sm mt-1">點選下方選擇</span>
      </div>

      <!-- 水平漸層條 + 10 格 -->
      <div class="relative h-16 rounded-2xl overflow-hidden mb-4"
           style="background: linear-gradient(to right, #22c55e, #84cc16, #eab308, #f97316, #ef4444);">
        <div id="thermo-bar" class="absolute inset-0 flex">
          <!-- 10 格由 JS 生成 -->
        </div>
      </div>

      <!-- 數字標籤 -->
      <div class="flex justify-between px-1 text-neutral-500 text-xs mb-8">
        <span>1 輕微</span>
        <span>5 中等</span>
        <span>10 爆炸</span>
      </div>
    </div>

    <!-- 推薦 + 開始按鈕（選完才出現） -->
    <div id="calm-start-section" class="hidden flex-col items-center gap-4">
      <div class="w-full p-4 rounded-2xl bg-panel border border-edge text-center">
        <p class="text-neutral-400 text-sm">推薦冷靜時長</p>
        <p id="recommend-text" class="text-3xl font-bold text-shield mt-1">90 秒</p>
        <p id="recommend-reason" class="text-neutral-600 text-xs mt-1">穩住，慢慢來</p>
      </div>
      <button id="btn-start-calm"
        class="btn-press w-full py-5 rounded-2xl
               bg-gradient-to-r from-blue-600 to-cyan-500
               text-white text-xl font-bold tracking-widest
               shadow-[0_0_30px_-5px_rgba(34,211,238,0.5)]">
        開始冷靜
      </button>
    </div>

    <button data-go="shield" class="mt-auto pt-4 text-neutral-600 text-sm btn-press self-center">← 返回</button>
  </section>

  <!-- ════════════════════════════════════════
       畫面 3：呼吸 + 圓形倒數
  ════════════════════════════════════════ -->
  <section id="screen-calm" class="screen flex-1 flex-col items-center justify-between px-6 pb-8">

    <div class="mt-4 text-center">
      <p id="calm-phase-label"
         class="text-2xl font-bold tracking-[0.2em] text-shield h-9 transition-all duration-300">
        準備
      </p>
      <p class="text-neutral-600 text-xs mt-1">吸 4 · 停 7 · 吐 8</p>
    </div>

    <!-- 呼吸圈 -->
    <div class="relative flex items-center justify-center"
         style="width: 260px; height: 260px;">
      <!-- 背景光暈 -->
      <div class="absolute inset-0 rounded-full bg-calm/5"></div>
      <!-- 呼吸球 -->
      <div id="breathe-orb"
           class="w-full h-full rounded-full
                  bg-gradient-to-br from-calm/50 via-shield/30 to-cyan-400/20
                  border border-shield/20
                  shadow-[0_0_60px_-10px_rgba(34,211,238,0.6)]">
      </div>
      <!-- 中心文字（相位） -->
      <div id="calm-center-text"
           class="absolute text-shield/70 text-sm tracking-widest font-light">
      </div>
    </div>

    <!-- 圓形倒數計時器 -->
    <div class="relative flex items-center justify-center" style="width: 140px; height: 140px;">
      <svg width="140" height="140" class="-rotate-90 absolute inset-0" aria-hidden="true">
        <defs>
          <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#22d3ee"/>
          </linearGradient>
        </defs>
        <!-- 背景圓 -->
        <circle cx="70" cy="70" r="58"
          stroke="#1f1f1f" stroke-width="7" fill="none"/>
        <!-- 進度圓 -->
        <circle id="timer-ring" cx="70" cy="70" r="58"
          stroke="url(#timerGrad)" stroke-width="7" fill="none"
          stroke-dasharray="364" stroke-dashoffset="0"/>
      </svg>
      <div class="relative text-center z-10">
        <span id="timer-num" class="text-4xl font-black text-white tabular-nums">90</span>
        <span class="block text-neutral-600 text-xs mt-0.5">秒</span>
      </div>
    </div>

    <div class="w-full space-y-3">
      <button id="btn-calm-done"
        class="btn-press w-full py-4 rounded-2xl bg-edge text-neutral-200 text-base tracking-wide">
        我冷靜了，下一步 →
      </button>
      <button id="btn-calm-back" data-go="rage"
        class="btn-press w-full py-3 rounded-xl text-neutral-600 text-sm btn-press">
        ← 重新選擇
      </button>
    </div>
  </section>

  <!-- ════════════════════════════════════════
       畫面 4：呼吸（護盾按鈕流程，保留舊版）
  ════════════════════════════════════════ -->
  <section id="screen-breathe" class="screen flex-1 flex-col items-center justify-center px-6">
    <div class="relative w-72 h-72 flex items-center justify-center">
      <div class="absolute w-full h-full rounded-full bg-calm/10"></div>
      <div class="breathe-orb-old w-full h-full rounded-full bg-gradient-to-br from-calm/40 to-shield/30 border border-shield/30"></div>
      <div id="breathe-label" class="absolute text-shield text-xl tracking-widest">準備</div>
    </div>
    <p class="mt-10 text-neutral-400 text-sm">跟著圈圈：吸 4 · 停 7 · 吐 8</p>
    <button data-go="translator"
      class="mt-8 px-8 py-3 rounded-full bg-edge text-neutral-200 btn-press">我冷靜了，下一步</button>
  </section>

  <!-- ════════════════════════════════════════
       畫面 5：禮貌化回應生成器
  ════════════════════════════════════════ -->
  <section id="screen-translator" class="screen flex-1 flex-col px-6 pb-8 overflow-y-auto">
    <h2 class="text-xl mt-2 mb-1">禮貌化回應生成器</h2>
    <p class="text-neutral-500 text-sm mb-4">說說發生什麼事，我幫你把想說的話包得有界線。</p>

    <!-- 快速情境 chip -->
    <div class="flex gap-2 overflow-x-auto pb-2 mb-4" style="-webkit-overflow-scrolling:touch">
      <button class="scenario-chip shrink-0 px-4 py-2 rounded-full bg-edge border border-neutral-700 text-neutral-300 text-sm btn-press whitespace-nowrap" data-scenario="blame_shift">鍋甩給我</button>
      <button class="scenario-chip shrink-0 px-4 py-2 rounded-full bg-edge border border-neutral-700 text-neutral-300 text-sm btn-press whitespace-nowrap" data-scenario="attitude">態度差／酸</button>
      <button class="scenario-chip shrink-0 px-4 py-2 rounded-full bg-edge border border-neutral-700 text-neutral-300 text-sm btn-press whitespace-nowrap" data-scenario="unfair_load">工作分配不公</button>
      <button class="scenario-chip shrink-0 px-4 py-2 rounded-full bg-edge border border-neutral-700 text-neutral-300 text-sm btn-press whitespace-nowrap" data-scenario="supervisor_pressure">主管施壓</button>
      <button class="scenario-chip shrink-0 px-4 py-2 rounded-full bg-edge border border-neutral-700 text-neutral-300 text-sm btn-press whitespace-nowrap" data-scenario="passive_aggressive">冷嘲熱諷</button>
      <button class="scenario-chip shrink-0 px-4 py-2 rounded-full bg-edge border border-neutral-700 text-neutral-300 text-sm btn-press whitespace-nowrap" data-scenario="repeat_nag">同件事一直盧</button>
    </div>

    <textarea id="rant-input" rows="4"
      placeholder="例：組員把自己沒做的部分全推給我，還說是我沒溝通清楚..."
      class="w-full bg-panel border border-edge rounded-2xl p-4 text-neutral-100 placeholder:text-neutral-600 focus:outline-none focus:border-shield/50 text-sm"></textarea>

    <div class="flex gap-3 mt-3">
      <button id="btn-voice" class="flex-none px-5 py-3 rounded-xl bg-edge text-neutral-200 btn-press">🎙</button>
      <button id="btn-generate" class="flex-1 py-3 rounded-xl bg-shield/20 border border-shield/40 text-shield btn-press font-medium">生成 3 種回應</button>
    </div>

    <!-- 三張回應卡 -->
    <div id="response-cards" class="mt-5 space-y-3 hidden">
      <div class="rounded-2xl bg-panel border border-emerald-900/60 overflow-hidden">
        <div class="flex items-center gap-2 px-4 pt-4 pb-2">
          <span class="text-xs px-2 py-0.5 rounded-full bg-emerald-900/60 text-emerald-400 border border-emerald-700/50">安全中性</span>
          <span class="text-neutral-600 text-xs">灰岩法・最短最無聊</span>
        </div>
        <p id="resp-gray" class="px-4 pb-3 text-neutral-100 text-base leading-relaxed"></p>
        <button class="copy-resp w-full py-2 text-neutral-500 text-xs border-t border-emerald-900/40 btn-press active:bg-emerald-900/20">複製</button>
      </div>

      <div class="rounded-2xl bg-panel border border-calm/30 overflow-hidden">
        <div class="flex items-center gap-2 px-4 pt-4 pb-2">
          <span class="text-xs px-2 py-0.5 rounded-full bg-calm/20 text-calm border border-calm/30">禮貌堅定</span>
          <span class="text-neutral-600 text-xs">I statement・有禮有節</span>
        </div>
        <p id="resp-firm" class="px-4 pb-3 text-neutral-100 text-base leading-relaxed"></p>
        <button class="copy-resp w-full py-2 text-neutral-500 text-xs border-t border-calm/20 btn-press active:bg-calm/10">複製</button>
      </div>

      <div class="rounded-2xl bg-panel border border-warn/30 overflow-hidden">
        <div class="flex items-center gap-2 px-4 pt-4 pb-2">
          <span class="text-xs px-2 py-0.5 rounded-full bg-warn/20 text-warn border border-warn/30">設定界線</span>
          <span class="text-neutral-600 text-xs">適合重複發生時</span>
        </div>
        <p id="resp-boundary" class="px-4 pb-3 text-neutral-100 text-base leading-relaxed"></p>
        <button class="copy-resp w-full py-2 text-neutral-500 text-xs border-t border-warn/20 btn-press active:bg-warn/10">複製</button>
      </div>
    </div>

    <div class="mt-4 flex items-center gap-2">
      <div class="flex-1 h-px bg-edge"></div>
      <span class="text-neutral-700 text-xs">或</span>
      <div class="flex-1 h-px bg-edge"></div>
    </div>
    <button id="btn-llm" disabled
      class="mt-3 w-full py-3 rounded-xl bg-edge/50 border border-neutral-800 text-neutral-700 text-sm btn-press">
      ✦ AI 真實生成（設定 › 填入 API Key 後啟用）
    </button>
  </section>

  <!-- ════════════════════════════════════════
       畫面 7：設定
  ════════════════════════════════════════ -->
  <section id="screen-settings" class="screen flex-1 flex-col px-6 pb-8">
    <h2 class="text-xl mt-2 mb-6">設定</h2>

    <div class="space-y-4">
      <div>
        <label class="block text-neutral-400 text-sm mb-2">Claude API Key</label>
        <input id="api-key-input" type="password"
          placeholder="sk-ant-..."
          class="w-full bg-panel border border-edge rounded-xl px-4 py-3 text-neutral-100 text-sm placeholder:text-neutral-600 focus:outline-none focus:border-shield/50" />
        <p class="text-neutral-600 text-xs mt-1.5">填入後解鎖 AI 真實生成，僅存於本機 localStorage。</p>
      </div>
      <button id="btn-save-key"
        class="btn-press w-full py-3 rounded-xl bg-shield/20 border border-shield/40 text-shield text-sm font-medium">
        儲存 API Key
      </button>
      <button id="btn-clear-key"
        class="btn-press w-full py-3 rounded-xl bg-edge text-neutral-500 text-sm">
        清除 API Key
      </button>
    </div>
  </section>

  <!-- 底部導覽（rage / calm 不顯示） -->
  <nav id="bottom-nav" class="px-6 py-4 flex justify-center">
    <button data-go="shield" class="text-neutral-500 text-sm tracking-widest btn-press">⌂ 回護盾</button>
  </nav>
</main>

<script>
/* ════════════════════════════════════════════
   路由
════════════════════════════════════════════ */
const ALL_SCREENS = ['shield','rage','calm','breathe','translator','settings'];
const HIDE_NAV = new Set(['rage','calm']);

function go(name) {
  ALL_SCREENS.forEach(s => {
    document.getElementById('screen-' + s).classList.toggle('active', s === name);
  });
  document.getElementById('bottom-nav').style.display = HIDE_NAV.has(name) ? 'none' : '';
  if (navigator.vibrate) navigator.vibrate(8);
  window.scrollTo(0, 0);
}

document.querySelectorAll('[data-go]').forEach(b =>
  b.addEventListener('click', () => go(b.dataset.go))
);

/* ════════════════════════════════════════════
   主護盾按鈕 → 舊版呼吸頁
════════════════════════════════════════════ */
document.getElementById('btn-shield').addEventListener('click', () => {
  if (navigator.vibrate) navigator.vibrate([30,40,30]);
  go('breathe');
  startBreatheLabelOld();
});

let breatheTimerOld = null;
function startBreatheLabelOld() {
  const label = document.getElementById('breathe-label');
  const cycle = [['吸', 4000], ['停', 7000], ['吐', 8000]];
  let i = 0;
  clearTimeout(breatheTimerOld);
  function tick() {
    label.textContent = cycle[i][0];
    breatheTimerOld = setTimeout(() => { i = (i + 1) % 3; tick(); }, cycle[i][1]);
  }
  tick();
}

/* ════════════════════════════════════════════
   「我現在很躁」→ 溫度計頁
════════════════════════════════════════════ */
document.getElementById('btn-rage').addEventListener('click', () => {
  if (navigator.vibrate) navigator.vibrate([20,30,20]);
  go('rage');
  resetRageScreen();
});

/* ── 溫度計：生成 10 格 ── */
const THERMO_COLORS = [
  '#22c55e','#4ade80','#84cc16','#bef264',
  '#fde047','#fbbf24','#fb923c','#f97316',
  '#ef4444','#dc2626',
];
const THERMO_LABELS = {
  1:'還好',2:'有點煩',3:'頗煩',4:'很煩',5:'很躁',
  6:'快爆了',7:'快爆了',8:'非常爆',9:'極限',10:'已爆炸',
};

let selectedRage = 0;
let calmDuration  = 90;

const thermoBar = document.getElementById('thermo-bar');
for (let i = 1; i <= 10; i++) {
  const seg = document.createElement('button');
  seg.className = 'thermo-seg flex-1 h-full flex items-end justify-center pb-1';
  seg.style.background = 'transparent';
  seg.innerHTML = `<span class="text-[10px] font-bold text-black/70">${i}</span>`;
  seg.dataset.score = i;
  seg.addEventListener('click', () => onSelectRage(i));
  thermoBar.appendChild(seg);
}

function resetRageScreen() {
  selectedRage = 0;
  document.getElementById('rage-score-num').textContent = '?';
  document.getElementById('rage-score-num').style.color = '#404040';
  document.getElementById('rage-score-label').textContent = '點選下方選擇';
  document.getElementById('calm-start-section').classList.add('hidden');
  thermoBar.querySelectorAll('.thermo-seg').forEach(s => s.classList.remove('active-seg'));
}

function onSelectRage(score) {
  if (navigator.vibrate) navigator.vibrate(12);
  selectedRage = score;

  // 更新分數顯示
  const numEl    = document.getElementById('rage-score-num');
  const labelEl  = document.getElementById('rage-score-label');
  numEl.textContent  = score;
  numEl.style.color  = THERMO_COLORS[score - 1];
  labelEl.textContent = THERMO_LABELS[score];

  // 高亮 segment
  thermoBar.querySelectorAll('.thermo-seg').forEach((s, idx) => {
    s.classList.toggle('active-seg', idx + 1 === score);
  });

  // 推薦時長
  calmDuration = score >= 7 ? 120 : 90;
  document.getElementById('recommend-text').textContent   = `${calmDuration} 秒`;
  document.getElementById('recommend-reason').textContent =
    score >= 8 ? '深呼吸，讓身體降溫'
    : score >= 6 ? '穩住，一步一步來'
    :              '你還撐得住，補個氧';

  document.getElementById('calm-start-section').classList.remove('hidden');
}

/* ════════════════════════════════════════════
   開始冷靜 → calm 頁
════════════════════════════════════════════ */
document.getElementById('btn-start-calm').addEventListener('click', () => {
  if (navigator.vibrate) navigator.vibrate([15,20,15]);
  go('calm');
  startCalmSession(calmDuration);
});

/* ── 計時器狀態 ── */
let timerInterval   = null;
let breathePhaseTO  = null;
let timerRemaining  = 0;

const CIRCUM = 364; // 2 * π * 58 ≈ 364

function startCalmSession(seconds) {
  clearInterval(timerInterval);
  clearTimeout(breathePhaseTO);

  timerRemaining = seconds;
  const ring = document.getElementById('timer-ring');
  const num  = document.getElementById('timer-num');
  ring.style.transition = 'none';
  ring.style.strokeDashoffset = 0;
  num.textContent = seconds;
  num.classList.remove('done-flash');

  // 強制 reflow，再啟用 transition
  ring.getBoundingClientRect();
  ring.style.transition = 'stroke-dashoffset 1s linear';

  timerInterval = setInterval(() => {
    timerRemaining--;
    num.textContent = timerRemaining;
    const elapsed = seconds - timerRemaining;
    ring.style.strokeDashoffset = (elapsed / seconds) * CIRCUM;

    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      onCalmDone();
    }
  }, 1000);

  startBreatheAnim();
}

function onCalmDone() {
  if (navigator.vibrate) navigator.vibrate([40,60,40,60,40]);
  const num = document.getElementById('timer-num');
  num.textContent = '✓';
  num.classList.add('done-flash');
  document.getElementById('calm-phase-label').textContent = '完成';
  document.getElementById('calm-center-text').textContent = '';
}

/* ── 呼吸動畫（JS 驅動 CSS transition） ── */
const PHASES = [
  { label: '吸　氣', center: '↑',  duration: 4000, scale: '1.0',  transition: '4s ease-in'  },
  { label: '屏　息', center: '‥',  duration: 7000, scale: '1.0',  transition: '0.3s ease'   },
  { label: '吐　氣', center: '↓',  duration: 8000, scale: '0.45', transition: '8s ease-out' },
];

function startBreatheAnim() {
  const orb    = document.getElementById('breathe-orb');
  const label  = document.getElementById('calm-phase-label');
  const center = document.getElementById('calm-center-text');

  // 重置
  orb.style.transition = 'none';
  orb.style.transform  = 'scale(0.45)';

  let phase = 0;

  function nextPhase() {
    const p = PHASES[phase];
    label.textContent  = p.label;
    center.textContent = p.center;
    orb.style.transition = `transform ${p.transition}`;
    orb.style.transform  = `scale(${p.scale})`;
    breathePhaseTO = setTimeout(() => {
      phase = (phase + 1) % 3;
      nextPhase();
    }, p.duration);
  }

  // 短暫延遲讓 transition:none 生效後才開始
  setTimeout(nextPhase, 80);
}

/* ── 完成/返回按鈕 ── */
document.getElementById('btn-calm-done').addEventListener('click', () => {
  clearInterval(timerInterval);
  clearTimeout(breathePhaseTO);
  go('translator');
});

document.getElementById('btn-calm-back').addEventListener('click', () => {
  clearInterval(timerInterval);
  clearTimeout(breathePhaseTO);
  go('rage');
});

/* ════════════════════════════════════════════
   禮貌化回應生成器

    boundary: '這件事我的部分我已經做了，責任的歸屬我有自己的判斷。如果你有不同看法，我們可以各自說清楚，但我不會接受這樣的定論。',
  },
  attitude: {

    boundary: '我願意繼續討論這件事，但前提是互相尊重。這樣的說話方式讓我很難繼續溝通，希望你能理解。',
  },
  unfair_load: {
    keywords: /我做比較多|分配不公|都是我在|他沒做|她沒貢獻|份量不均|憑什麼我|白做|出工|不公平/,
    gray:     '我記住了。',
    firm:     '我想提一下工作分配的問題。我目前負責的部分比當初討論的多，我希望我們可以重新確認一下每個人的範圍。',
    boundary: '我做這個沒問題，但我需要這件事被看見。如果分工一直是這樣的狀態，我之後會需要調整我能承擔的範圍。',
  },
  supervisor_pressure: {
    keywords: /主管|老闆|上司|長官|叫我|要我|命令|交代|不合理|壓力|deadline|截止|為什麼是我|加班/i,
    gray:     '好，我知道了。',
    firm:     '我會盡力配合，但我想先確認一下這個需求的優先順序，因為目前手上還有其他事情在跑，想確保都能做好。',
    boundary: '這個我可以做，但我需要說明一下目前的狀況：[說明現況]。如果這是最優先的，我會需要調整其他事項的時程，可以再確認嗎？',
  },
  passive_aggressive: {

    gray:     '嗯，謝謝你告訴我。',
    firm:     '我聽到你說的，但我不太確定你的意思是什麼。如果你有什麼想直接說的，我很樂意聽。',
    boundary: '我不太習慣這種方式溝通。如果你對我有什麼意見或不滿，我希望你可以直接說，這樣對大家都比較好。',
  },
  repeat_nag: {

    firm:     '這件事我們已經討論過了，我的想法跟上次一樣。如果有新的資訊或角度，我很願意再聊，但目前的立場不會變。',

const FALLBACK = {
  gray:     '好。',
  firm:     '我理解你的感受，但這件事我有自己的看法。',
  boundary: '我的答案不會改變，這件事到這裡結束。',
};

function detectSituation(text) {
  for (const sit of Object.values(SITUATION_DB)) {
    if (sit.keywords.test(text)) return sit;
  }
  return null;
}

function renderResponses(sit) {
  const s = sit || FALLBACK;
  document.getElementById('resp-gray').textContent     = s.gray;
  document.getElementById('resp-firm').textContent     = s.firm;
  document.getElementById('resp-boundary').textContent = s.boundary;
  const cards = document.getElementById('response-cards');
  cards.classList.remove('hidden');
  setTimeout(() => cards.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
}

document.querySelectorAll('.scenario-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.scenario-chip').forEach(c =>
      c.classList.remove('!border-shield/60', 'text-shield'));
    chip.classList.add('!border-shield/60', 'text-shield');
    if (navigator.vibrate) navigator.vibrate(8);
    renderResponses(SITUATION_DB[chip.dataset.scenario]);
  });
});

document.getElementById('btn-generate').addEventListener('click', () => {
  const text = document.getElementById('rant-input').value.trim();
  renderResponses(text ? detectSituation(text) : null);
});

document.querySelectorAll('.copy-resp').forEach((btn, i) => {
  const ids = ['resp-gray', 'resp-firm', 'resp-boundary'];
  btn.addEventListener('click', async () => {
    const txt = document.getElementById(ids[i]).textContent;
    try { await navigator.clipboard.writeText(txt); } catch (e) {}
    btn.textContent = '✓ 已複製';
    setTimeout(() => { btn.textContent = '複製'; }, 1200);
    if (navigator.vibrate) navigator.vibrate(15);
  });
});

document.getElementById('btn-voice').addEventListener('click', () => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('這台手機暫不支援語音，先用打字。'); return; }
  const r = new SR(); r.lang = 'zh-TW'; r.start();
  r.onresult = e => {
    document.getElementById('rant-input').value = e.results[0][0].transcript;
  };
});

/* ── AI 真實生成 ── */
function getApiKey() { return localStorage.getItem('shield_api_key') || ''; }

function syncLlmButton() {
  const btn = document.getElementById('btn-llm');
  const has = !!getApiKey();
  btn.disabled = !has;
  btn.className = has
    ? 'btn-press mt-3 w-full py-3 rounded-xl bg-shield/10 border border-shield/30 text-shield text-sm'
    : 'btn-press mt-3 w-full py-3 rounded-xl bg-edge/50 border border-neutral-800 text-neutral-700 text-sm';
  btn.textContent = has ? '✦ AI 真實生成' : '✦ AI 真實生成（設定 › 填入 API Key 後啟用）';
}

async function callLLM(text) {
  const apiKey = getApiKey();
  if (!apiKey) return null;
  const prompt = `你是一個人際衝突應對助理，專門幫助面對難搞同學、主管或朋友的人。

使用者描述的狀況：「${text}」

請生成三種回應，每種一行，用換行分隔，不要加編號或標題：
第一行：安全中性版（最短，像一塊無聊的石頭，不給對方能量）
第二行：禮貌堅定版（有禮貌但立場清楚，使用 I statement）
第三行：設定界線版（適合重複發生時，明確說出你的底線）

只輸出三行，不要任何解釋。`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 300,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) throw new Error(await res.text());
  const data = await res.json();
  const lines = data.content[0].text.trim().split('\n').map(s => s.trim()).filter(Boolean);
  return {
    gray:     lines[0] || '好。',
    firm:     lines[1] || '我理解，但我的立場是清楚的。',
    boundary: lines[2] || '這件事我的答案不會改變。',
  };
}

document.getElementById('btn-llm').addEventListener('click', async () => {
  const text = document.getElementById('rant-input').value.trim();
  if (!text) { alert('請先描述發生的狀況。'); return; }
  const btn = document.getElementById('btn-llm');
  btn.textContent = '生成中…';
  btn.disabled = true;
  try {
    const result = await callLLM(text);
    if (result) renderResponses(result);
  } catch (e) {
    alert('呼叫失敗，請確認 API Key 是否正確，或網路是否正常。');
  } finally {
    btn.disabled = false;
    syncLlmButton();
  }
});

/* ── 設定頁：API Key ── */
(function initSettings() {
  const input = document.getElementById('api-key-input');
  input.value = getApiKey();
  syncLlmButton();

  document.getElementById('btn-save-key').addEventListener('click', () => {
    const v = input.value.trim();
    if (v) { localStorage.setItem('shield_api_key', v); }
    syncLlmButton();
    if (navigator.vibrate) navigator.vibrate(15);
    document.getElementById('btn-save-key').textContent = '✓ 已儲存';
    setTimeout(() => { document.getElementById('btn-save-key').textContent = '儲存 API Key'; }, 1500);
  });

  document.getElementById('btn-clear-key').addEventListener('click', () => {
    localStorage.removeItem('shield_api_key');
    input.value = '';
    syncLlmButton();
    if (navigator.vibrate) navigator.vibrate(8);
  });
})();
